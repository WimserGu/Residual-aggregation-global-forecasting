name: Smoke tests

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package and test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[test]"

      - name: Run unit tests
        run: pytest

      - name: Generate schema-compatible synthetic sample
        run: python scripts/prepare_processed_data.py --synthetic-sample --output data/processed/monthly_market_series.csv
